name: BiocCheck

on:
  push:
    branches:
      - main
      - master
      - tidy-v2
  pull_request:

jobs:
  bioccheck:
    runs-on: ubuntu-latest

    steps:
      # Run a lightweight Bioconductor-oriented quality pass on push and PR.
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::BiocManager
            bioc::BiocCheck
            local::.
          needs: check

      - name: Run BiocCheck
        run: BiocCheck::BiocCheck(".")
        shell: Rscript {0}
