name: BiocCheck

on:
  push:
    branches:
      - main
      - master
      - tidy-v2
  pull_request:

jobs:
  bioccheck:
    runs-on: ubuntu-latest

    steps:
      # Run a lightweight Bioconductor-oriented quality pass on push and PR.
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install BiocCheck and package dependencies
        run: |
          install.packages(c("BiocManager", "remotes"), repos = "https://cloud.r-project.org")
          BiocManager::install(c("BiocCheck", "SummarizedExperiment", "S4Vectors"), ask = FALSE, update = FALSE)
          remotes::install_deps(dependencies = TRUE, upgrade = "never")
          remotes::install_local(upgrade = "never", dependencies = FALSE)
        shell: Rscript {0}

      - name: Run BiocCheck
        run: BiocCheck::BiocCheck(".")
        shell: Rscript {0}
